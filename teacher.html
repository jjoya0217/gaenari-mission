<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌼 개나리 꽃피우기 - 교사 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Round+Square:wght@400;700;800&display=swap');

:root {
  --yellow1: #FFE033;
  --yellow2: #FFB300;
  --brown:   #5D4037;
  --brown2:  #795548;
  --green1:  #88CC66;
  --green2:  #5DAA50;
  --sky:     #87CEEB;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nanum Round Square', 'Malgun Gothic', sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg, var(--sky) 0%, #C5E8FF 58%, var(--green1) 58%, var(--green2) 100%);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ─────────── 헤더 ─────────── */
.header {
  background: linear-gradient(135deg, var(--yellow1) 0%, var(--yellow2) 100%);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 3px 14px rgba(0,0,0,0.18);
  border-bottom: 3px solid #FF8F00;
  flex-shrink: 0;
  flex-wrap: wrap;
  gap: 6px;
}

.header h1 {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--brown);
}

.header-stat {
  font-size: 1rem;
  font-weight: 700;
  color: var(--brown);
  background: rgba(255,255,255,0.55);
  padding: 5px 14px;
  border-radius: 20px;
}

/* ─────────── SVG 정원 ─────────── */
.garden-wrap {
  width: 100%;
  max-width: 960px;
  margin: 0 auto;
  padding: 4px 8px 0;
  flex-shrink: 0;
}

#garden {
  width: 100%;
  height: auto;
  display: block;
}

/* 꽃 — 기본 숨김 → 'bloomed' 클래스로 나타남 */
.ff {
  opacity: 0;
  transform-box: fill-box;
  transform-origin: 50% 100%;
  transition: opacity 0.9s ease, transform 0.9s ease;
  transform: scale(0.2);
}
.ff.bloomed {
  opacity: 1;
  transform: scale(1);
}

/* 구름 부유 애니메이션 */
.cloud-group { animation: cloudDrift 24s linear infinite; }
.cloud-group2 { animation: cloudDrift 32s linear infinite; animation-delay: -14s; }
@keyframes cloudDrift {
  from { transform: translateX(-180px); opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 1; }
  to   { transform: translateX(1000px); opacity: 0; }
}

/* ─────────── 단계 레이블 ─────────── */
.stage-label {
  text-align: center;
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--brown);
  padding: 6px 0 4px;
  text-shadow: 1px 1px 4px rgba(255,255,255,0.7);
  min-height: 2rem;
  flex-shrink: 0;
}

/* ─────────── 진행률 바 ─────────── */
.progress-wrap {
  width: 100%;
  max-width: 960px;
  margin: 0 auto;
  padding: 6px 14px;
  flex-shrink: 0;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  font-size: 1rem;
  font-weight: 700;
  color: var(--brown);
  margin-bottom: 6px;
}

.progress-bg {
  background: rgba(255,255,255,0.55);
  border-radius: 30px;
  height: 26px;
  overflow: hidden;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.12);
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--yellow1), var(--yellow2));
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 10px;
  font-size: 0.85rem;
  font-weight: 800;
  color: var(--brown);
  transition: width 0.9s ease;
  min-width: 36px;
}

/* ─────────── 모둠 카드 ─────────── */
.groups-wrap {
  width: 100%;
  max-width: 960px;
  margin: 4px auto;
  padding: 0 12px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  flex-shrink: 0;
}

.group-card {
  background: rgba(255,255,255,0.92);
  border-radius: 18px;
  padding: 8px 4px;
  text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  border: 2px solid var(--yellow1);
  transition: transform 0.25s, border-color 0.25s;
}

.group-card.active-pulse {
  animation: cardPulse 0.4s ease;
  border-color: var(--yellow2);
}

@keyframes cardPulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.gname {
  font-size: 0.78rem;
  font-weight: 800;
  color: var(--brown);
  margin-bottom: 2px;
}

.gcount {
  font-size: 1.7rem;
  font-weight: 800;
  color: #FF8F00;
  line-height: 1;
}

.gunit {
  font-size: 0.68rem;
  color: #999;
  margin-top: 2px;
}

/* ─────────── 설정 패널 ─────────── */
.settings-wrap {
  width: 100%;
  max-width: 960px;
  margin: 4px auto 8px;
  padding: 0 12px;
  flex-shrink: 0;
}

.settings-inner {
  background: rgba(255,255,255,0.88);
  border-radius: 22px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  box-shadow: 0 3px 12px rgba(0,0,0,0.1);
}

.settings-inner label {
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--brown);
}

.settings-inner input[type=number] {
  width: 72px;
  padding: 6px 8px;
  border: 2px solid var(--yellow2);
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
  font-family: inherit;
  outline: none;
}

.settings-inner input:focus {
  border-color: #FF8F00;
  box-shadow: 0 0 0 3px rgba(255,179,0,0.2);
}

.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 14px;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.15s, box-shadow 0.15s;
}

.btn:hover { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(0,0,0,0.2); }
.btn:active { transform: translateY(0); }

.btn-set   { background: linear-gradient(135deg, #FFB300, #FFD740); color: var(--brown); }
.btn-reset { background: linear-gradient(135deg, #FF7043, #FF8A65); color: white; }
.btn-start { background: linear-gradient(135deg, #43A047, #66BB6A); color: white; }

/* ─────────── 축하 오버레이 ─────────── */
#celebration {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,224,0,0.75);
  backdrop-filter: blur(6px);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

#celebration.show { display: flex; }

.cel-emoji {
  font-size: 7rem;
  animation: spin 2.5s linear infinite;
  filter: drop-shadow(0 0 20px rgba(255,200,0,0.9));
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.cel-msg {
  font-size: 2.6rem;
  font-weight: 800;
  color: var(--brown);
  text-align: center;
  text-shadow: 2px 3px 10px rgba(255,255,255,0.8);
  animation: msgBounce 0.6s ease-in-out infinite alternate;
  line-height: 1.3;
}

@keyframes msgBounce {
  from { transform: scale(1); }
  to   { transform: scale(1.06); }
}

.cel-sub {
  font-size: 1.1rem;
  color: var(--brown2);
  margin-top: 18px;
  font-weight: 700;
}

/* 꽃잎 파티클 */
.petal {
  position: fixed;
  border-radius: 50% 0 50% 0;
  pointer-events: none;
  animation: petalFall var(--dur) linear forwards;
}

@keyframes petalFall {
  0%   { transform: translateY(-40px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(var(--rot)); opacity: 0; }
}
</style>

<!-- ─── Firebase SDK ─── -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
// ═══════════════════════════════════════
// 1) Firebase 초기화
// ═══════════════════════════════════════
firebase.initializeApp(firebaseConfig);
const db         = firebase.database();
const sessionRef = db.ref('session');

// ═══════════════════════════════════════
// 2) 꽃 관련 상수 & 상태
// ═══════════════════════════════════════
const TOTAL_FLOWERS  = document.querySelectorAll('.ff').length; // 42
let   celebShown     = false;
let   prevCounts     = [0,0,0,0,0,0];

// 단계 정의
const STAGES = [
  { max: 0.20, msg: '🌱 새싹이 돋아나고 있어요...' },
  { max: 0.40, msg: '🌿 줄기가 쑥쑥 자라나요!' },
  { max: 0.70, msg: '🌼 꽃봉오리가 맺혔어요!' },
  { max: 0.99, msg: '🌸 개나리꽃이 피어나요~' },
  { max: 1.00, msg: '🌼🌼 개나리꽃이 활짝 피었어요! 🌼🌼' },
];

// ═══════════════════════════════════════
// 3) Firebase 실시간 리스너
// ═══════════════════════════════════════
sessionRef.on('value', (snap) => {
  const data = snap.val();
  if (!data) return;

  const goal   = data.goal   || 60;
  const groups = data.groups || {};

  // 목표값 입력란 동기화
  document.getElementById('goalInput').value = goal;

  // 각 모둠 카운트
  let total = 0;
  for (let i = 1; i <= 6; i++) {
    const g     = groups[`group${i}`] || {};
    const count = g.count || 0;
    total += count;

    document.getElementById(`g${i}`).textContent = count;

    // 새 탭이 들어오면 카드 펄스 효과
    if (count > prevCounts[i-1]) {
      const card = document.getElementById(`gc${i}`);
      card.classList.remove('active-pulse');
      void card.offsetWidth;
      card.classList.add('active-pulse');
    }
    prevCounts[i-1] = count;
  }

  // 꽃 & UI 업데이트
  updateGarden(total, goal);
});

// ═══════════════════════════════════════
// 4) 정원 UI 업데이트
// ═══════════════════════════════════════
function updateGarden(total, goal) {
  const pct     = Math.min(total / goal, 1);
  const pctInt  = Math.round(pct * 100);
  const toShow  = Math.round(pct * TOTAL_FLOWERS);

  // 꽃 개수 조절
  document.querySelectorAll('.ff').forEach((el, i) => {
    if (i < toShow) el.classList.add('bloomed');
    else            el.classList.remove('bloomed');
  });

  // 진행률 바
  document.getElementById('progressFill').style.width    = pctInt + '%';
  document.getElementById('progressFill').textContent    = pctInt + '%';
  document.getElementById('progressText').textContent    = `${total} / ${goal}번 (${pctInt}%)`;
  document.getElementById('hTotal').textContent          = total;
  document.getElementById('hGoal').textContent           = goal;

  // 단계 레이블
  let msg = STAGES[STAGES.length - 1].msg;
  for (const s of STAGES) {
    if (pct <= s.max) { msg = s.msg; break; }
  }
  document.getElementById('stageText').textContent = msg;

  // 축하
  if (pct >= 1 && !celebShown) {
    celebShown = true;
    setTimeout(showCelebration, 700);
  }
  if (pct < 1) celebShown = false;
}

// ═══════════════════════════════════════
// 5) 교사 제어 버튼
// ═══════════════════════════════════════
function setGoal() {
  const g = parseInt(document.getElementById('goalInput').value);
  if (!g || g < 1) { alert('올바른 목표 횟수를 입력해 주세요!'); return; }
  sessionRef.update({ goal: g });
  alert(`목표를 ${g}번으로 설정했어요! 🌼`);
}

function resetSession() {
  if (!confirm('모든 집계를 0으로 초기화할까요?')) return;
  const g      = parseInt(document.getElementById('goalInput').value) || 60;
  const groups = {};
  for (let i = 1; i <= 6; i++) groups[`group${i}`] = { count: 0, lastTap: 0 };
  sessionRef.set({ goal: g, isActive: false, groups });
  celebShown = false;
  document.getElementById('celebration').classList.remove('show');
  alert('초기화 완료! 새 수업을 시작할 수 있어요 🌱');
}

function startSession() {
  const g = parseInt(document.getElementById('goalInput').value) || 60;
  sessionRef.once('value', (snap) => {
    const data = snap.val();
    if (!data || !data.groups) {
      // 처음 시작 — 초기 데이터 세팅
      const groups = {};
      for (let i = 1; i <= 6; i++) groups[`group${i}`] = { count: 0, lastTap: 0 };
      sessionRef.set({ goal: g, isActive: true, groups });
    } else {
      sessionRef.update({ isActive: true, goal: g });
    }
    alert(`수업을 시작했어요! 🌿\n각 모둠 탭에서 student.html?group=번호 로 접속하면 됩니다.`);
  });
}

// ═══════════════════════════════════════
// 6) 축하 효과
// ═══════════════════════════════════════
function showCelebration() {
  document.getElementById('celebration').classList.add('show');
  for (let i = 0; i < 60; i++) {
    setTimeout(() => spawnPetal(), i * 80);
  }
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
}

function spawnPetal() {
  const p     = document.createElement('div');
  p.className = 'petal';
  const colors = ['#FFE033','#FFD700','#FFF176','#FFB300','#FFCA28','#FFF59D'];
  const size   = 8 + Math.random() * 10;
  p.style.width            = size + 'px';
  p.style.height           = size + 'px';
  p.style.left             = Math.random() * 100 + 'vw';
  p.style.background       = colors[Math.floor(Math.random() * colors.length)];
  p.style.setProperty('--dur', (2.5 + Math.random() * 2) + 's');
  p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
  p.style.animationDelay   = Math.random() * 0.5 + 's';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 5000);
}
</script>
