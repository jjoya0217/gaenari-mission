<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌼 개나리 꽃피우기 - 교사 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Round+Square:wght@400;700;800&display=swap');

:root {
  --yellow1: #FFE033;
  --yellow2: #FFB300;
  --brown:   #5D4037;
  --green1:  #88CC66;
  --green2:  #5DAA50;
  --sky:     #87CEEB;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nanum Round Square', 'Malgun Gothic', sans-serif;
  min-height: 100vh;
  background: linear-gradient(175deg, var(--sky) 0%, #D0EEFF 58%, var(--green1) 58%, var(--green2) 100%);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ─── 헤더 ─── */
.header {
  background: linear-gradient(135deg, var(--yellow1) 0%, var(--yellow2) 100%);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  border-bottom: 3px solid #FF8F00;
  flex-shrink: 0;
  flex-wrap: wrap;
  gap: 6px;
}

.header h1 {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--brown);
}

.header-stat {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--brown);
  background: rgba(255,255,255,0.6);
  padding: 5px 16px;
  border-radius: 20px;
}

/* ─── ★ 핵심 단계 표시 영역 ─── */
.stage-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 16px 4px;
  min-height: 38vh;
  position: relative;
}

/* 단계 텍스트 — 상단 가운데 */
.stage-text {
  font-size: clamp(1.5rem, 4.5vw, 2.6rem);
  font-weight: 800;
  color: var(--brown);
  text-align: center;
  text-shadow: 0 2px 12px rgba(255,255,255,0.95), 0 0 40px rgba(255,224,0,0.4);
  letter-spacing: -0.5px;
  margin-bottom: 6px;
  line-height: 1.2;
  min-height: 3rem;
}

/* 단계 이미지 — 중앙에 매우 크게 */
.stage-emoji {
  width: clamp(160px, 30vw, 280px);
  height: clamp(160px, 30vw, 280px);
  object-fit: contain;
  display: block;
  margin: 0 auto;
  filter: drop-shadow(0 12px 32px rgba(0,0,0,0.22))
          drop-shadow(0 0 60px rgba(255,220,0,0.35));
  user-select: none;
  cursor: default;
  transition: filter 0.4s;
}

/* 단계 전환 팝 애니메이션 */
@keyframes stagePop {
  0%   { transform: scale(0.3) rotate(-15deg); opacity: 0;  filter: blur(8px); }
  55%  { transform: scale(1.18) rotate(6deg);  opacity: 1;  filter: blur(0); }
  78%  { transform: scale(0.95) rotate(-3deg); }
  100% { transform: scale(1) rotate(0deg);     opacity: 1;  }
}
.stage-emoji.pop {
  animation: stagePop 0.7s cubic-bezier(.22,1.4,.64,1) forwards;
}

/* 살짝 두둥실 기본 움직임 */
@keyframes emojiFloat {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50%     { transform: translateY(-14px) rotate(1deg); }
}
.stage-emoji.float {
  animation: emojiFloat 3s ease-in-out infinite;
}

/* ─── 진행률 바 ─── */
.progress-wrap {
  width: 100%;
  max-width: 960px;
  margin: 0 auto;
  padding: 6px 14px;
  flex-shrink: 0;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  font-size: 1rem;
  font-weight: 700;
  color: var(--brown);
  margin-bottom: 6px;
}

.progress-bg {
  background: rgba(255,255,255,0.6);
  border-radius: 30px;
  height: 30px;
  overflow: hidden;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.14);
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--yellow1) 0%, var(--yellow2) 60%, #FF8F00 100%);
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 12px;
  font-size: 0.9rem;
  font-weight: 800;
  color: var(--brown);
  transition: width 1s ease;
  min-width: 48px;
}

/* ─── 모둠 카드 ─── */
.groups-wrap {
  width: 100%;
  max-width: 960px;
  margin: 6px auto 0;
  padding: 0 12px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  flex-shrink: 0;
}

.group-card {
  background: rgba(255,255,255,0.93);
  border-radius: 18px;
  padding: 10px 4px;
  text-align: center;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  border: 2px solid var(--yellow1);
  transition: border-color 0.2s;
}

.group-card.active-pulse {
  animation: cardPulse 0.45s ease;
  border-color: #FF8F00;
}

@keyframes cardPulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}

.gname  { font-size: 0.8rem;  font-weight: 800; color: var(--brown); margin-bottom: 2px; }
.gcount { font-size: 1.9rem;  font-weight: 800; color: #FF8F00; line-height: 1; }
.gunit  { font-size: 0.7rem;  color: #aaa; margin-top: 2px; }

/* ─── 설정 패널 ─── */
.settings-wrap {
  width: 100%;
  max-width: 960px;
  margin: 6px auto 10px;
  padding: 0 12px;
  flex-shrink: 0;
}

.settings-inner {
  background: rgba(255,255,255,0.9);
  border-radius: 22px;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  box-shadow: 0 3px 14px rgba(0,0,0,0.1);
}

.settings-inner label {
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--brown);
}

.settings-inner input[type=number] {
  width: 72px;
  padding: 7px 8px;
  border: 2px solid var(--yellow2);
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
  font-family: inherit;
  outline: none;
}

.settings-inner input:focus {
  border-color: #FF8F00;
  box-shadow: 0 0 0 3px rgba(255,179,0,0.22);
}

.btn {
  padding: 9px 18px;
  border: none;
  border-radius: 14px;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:hover  { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(0,0,0,0.2); }
.btn:active { transform: translateY(0); }
.btn-set   { background: linear-gradient(135deg, #FFB300, #FFD740); color: var(--brown); }
.btn-reset { background: linear-gradient(135deg, #FF7043, #FF8A65); color: white; }
.btn-start { background: linear-gradient(135deg, #43A047, #66BB6A); color: white; }

/* ─── 축하 오버레이 ─── */
#celebration {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,228,0,0.82);
  backdrop-filter: blur(8px);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
#celebration.show { display: flex; }

.cel-emoji {
  font-size: min(22vw, 200px);
  line-height: 1;
  margin-bottom: 16px;
  filter: drop-shadow(0 0 30px rgba(255,200,0,0.9));
  animation: celBounce 1s ease-in-out infinite alternate;
}
@keyframes celBounce {
  from { transform: scale(1) rotate(-6deg); }
  to   { transform: scale(1.12) rotate(6deg); }
}

.cel-msg {
  font-size: clamp(2rem, 5.5vw, 3.4rem);
  font-weight: 800;
  color: var(--brown);
  text-align: center;
  text-shadow: 2px 4px 12px rgba(255,255,255,0.8);
  line-height: 1.3;
  z-index: 1;
}

.cel-sub {
  font-size: 1rem;
  color: var(--brown);
  margin-top: 22px;
  font-weight: 700;
  opacity: 0.75;
  z-index: 1;
}

/* ─── 꽃 파티클 (화면 전체 흩날림) ─── */
.flower-particle {
  position: fixed;
  pointer-events: none;
  font-size: var(--fsize);
  left: var(--left);
  top: -60px;
  z-index: 400;
  animation: flowerFall var(--dur) var(--delay) ease-in forwards;
}
@keyframes flowerFall {
  0%   { transform: translateY(0)     translateX(0)          rotate(0deg)         scale(var(--s)); opacity: 1; }
  30%  { transform: translateY(30vh)  translateX(var(--sx))  rotate(120deg)        scale(var(--s)); }
  60%  { transform: translateY(65vh)  translateX(calc(var(--sx)*-1.2)) rotate(260deg) scale(var(--s)); }
  100% { transform: translateY(115vh) translateX(var(--sx))  rotate(var(--rot))   scale(var(--s)); opacity: 0; }
}
</style>
</head>
<body>

<!-- ─── 헤더 ─── -->
<div class="header">
  <h1>🌼 개나리 꽃피우기</h1>
  <div class="header-stat">
    목표 <span id="hGoal">60</span>번 &nbsp;|&nbsp; 현재 <span id="hTotal">0</span>번
  </div>
</div>

<!-- ★★★ 단계 표시 — 텍스트 상단 + 이모지 중앙 크게 ★★★ -->
<div class="stage-area">
  <!-- 단계 텍스트: 가운데 상단 -->
  <div class="stage-text" id="stageText">새싹이 돋아나고 있어요...</div>

  <!-- 단계 이미지: 가운데 매우 크게 -->
  <img class="stage-emoji float" id="stageEmoji" src="1.png" alt="단계 이미지">
</div>

<!-- ─── 진행률 바 ─── -->
<div class="progress-wrap">
  <div class="progress-header">
    <span>🌼 개나리꽃 피우기 진행률</span>
    <span id="progressText">0 / 60번 (0%)</span>
  </div>
  <div class="progress-bg">
    <div class="progress-fill" id="progressFill">0%</div>
  </div>
</div>

<!-- ─── 모둠 카드 ─── -->
<div class="groups-wrap">
  <div class="group-card" id="gc1"><div class="gname">💧 1모둠</div><div class="gcount" id="g1">0</div><div class="gunit">번</div></div>
  <div class="group-card" id="gc2"><div class="gname">💧 2모둠</div><div class="gcount" id="g2">0</div><div class="gunit">번</div></div>
  <div class="group-card" id="gc3"><div class="gname">💧 3모둠</div><div class="gcount" id="g3">0</div><div class="gunit">번</div></div>
  <div class="group-card" id="gc4"><div class="gname">💧 4모둠</div><div class="gcount" id="g4">0</div><div class="gunit">번</div></div>
  <div class="group-card" id="gc5"><div class="gname">💧 5모둠</div><div class="gcount" id="g5">0</div><div class="gunit">번</div></div>
  <div class="group-card" id="gc6"><div class="gname">💧 6모둠</div><div class="gcount" id="g6">0</div><div class="gunit">번</div></div>
</div>

<!-- ─── 설정 패널 ─── -->
<div class="settings-wrap">
  <div class="settings-inner">
    <label>🎯 목표 횟수</label>
    <input type="number" id="goalInput" value="60" min="1" max="999"/>
    <span style="font-weight:700;color:#5D4037">번</span>
    <button class="btn btn-set"   onclick="setGoal()">설정</button>
    <button class="btn btn-reset" onclick="resetSession()">🔄 초기화</button>
    <button class="btn btn-start" onclick="startSession()">▶ 수업 시작</button>
  </div>
</div>

<!-- ─── 축하 오버레이 ─── -->
<div id="celebration" onclick="closeCelebration()">
  <div class="cel-emoji">🌼</div>
  <div class="cel-msg">우리 모두 함께<br>개나리꽃을 피웠어요!</div>
  <div class="cel-sub">화면을 탭하면 닫혀요 ✨</div>
</div>

<!-- ─── Firebase ─── -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
// ══════════════════════════════════════
// 1) Firebase 초기화
// ══════════════════════════════════════
firebase.initializeApp(firebaseConfig);
const db         = firebase.database();
const sessionRef = db.ref('session');

// ══════════════════════════════════════
// 2) 단계 정의 — 이미지 파일명 + 텍스트
// ★ 이미지 파일을 바꾸고 싶으면 img: 뒤 파일명만 수정하세요!
// ══════════════════════════════════════
const STAGES = [
  { max: 0.01, img: '1.png', text: '시작해볼까요? 물을 주세요! 💧' },
  { max: 0.30, img: '2.png', text: '새싹이 돋아나고 있어요...' },
  { max: 0.55, img: '3.png', text: '줄기가 쑥쑥 자라나요!' },
  { max: 0.75, img: '4.png', text: '꽃봉오리가 맺혔어요!' },
  { max: 0.99, img: '5.png', text: '개나리꽃이 피어나요~' },
  { max: 1.00, img: '6.png', text: '개나리꽃이 활짝 피었어요! 🎉' },
];

let celebShown = false;
let prevCounts = [0, 0, 0, 0, 0, 0];
let prevEmoji  = '';

// ══════════════════════════════════════
// 3) Firebase 실시간 리스너
// ══════════════════════════════════════
sessionRef.on('value', (snap) => {
  const data = snap.val();
  if (!data) return;

  const goal   = data.goal   || 60;
  const groups = data.groups || {};

  document.getElementById('goalInput').value = goal;

  let total = 0;
  for (let i = 1; i <= 6; i++) {
    const count = (groups[`group${i}`] || {}).count || 0;
    total += count;
    document.getElementById(`g${i}`).textContent = count;

    if (count > prevCounts[i - 1]) {
      const card = document.getElementById(`gc${i}`);
      card.classList.remove('active-pulse');
      void card.offsetWidth;
      card.classList.add('active-pulse');
    }
    prevCounts[i - 1] = count;
  }

  updateDisplay(total, goal);
});

// ══════════════════════════════════════
// 4) 화면 업데이트
// ══════════════════════════════════════
function updateDisplay(total, goal) {
  const pct    = Math.min(total / goal, 1);
  const pctInt = Math.round(pct * 100);

  // 진행률 바
  document.getElementById('progressFill').style.width = pctInt + '%';
  document.getElementById('progressFill').textContent = pctInt + '%';
  document.getElementById('progressText').textContent  = `${total} / ${goal}번 (${pctInt}%)`;
  document.getElementById('hTotal').textContent = total;
  document.getElementById('hGoal').textContent  = goal;

  // 현재 단계 찾기
  let stage = STAGES[STAGES.length - 1];
  for (const s of STAGES) {
    if (pct <= s.max) { stage = s; break; }
  }

  // 텍스트 업데이트
  document.getElementById('stageText').textContent = stage.text;

  // 이미지 업데이트 (단계가 바뀔 때만 팝 애니메이션)
  const imgEl = document.getElementById('stageEmoji');
  if (stage.img !== prevEmoji) {
    imgEl.classList.remove('float', 'pop');
    void imgEl.offsetWidth;               // reflow
    imgEl.src = stage.img;
    imgEl.classList.add('pop');

    // 팝 끝나면 다시 두둥실 float
    imgEl.addEventListener('animationend', () => {
      imgEl.classList.remove('pop');
      imgEl.classList.add('float');
    }, { once: true });

    prevEmoji = stage.img;
  }

  // 목표 달성 축하
  if (pct >= 1 && !celebShown) {
    celebShown = true;
    setTimeout(showCelebration, 600);
  }
  if (pct < 1) celebShown = false;
}

// ══════════════════════════════════════
// 5) 교사 제어 버튼
// ══════════════════════════════════════
function setGoal() {
  const g = parseInt(document.getElementById('goalInput').value);
  if (!g || g < 1) { alert('올바른 목표 횟수를 입력해 주세요!'); return; }
  sessionRef.update({ goal: g });
  alert(`목표를 ${g}번으로 설정했어요! 🌼`);
}

function resetSession() {
  if (!confirm('모든 집계를 0으로 초기화할까요?')) return;
  const g = parseInt(document.getElementById('goalInput').value) || 60;
  const groups = {};
  for (let i = 1; i <= 6; i++) groups[`group${i}`] = { count: 0, lastTap: 0 };
  sessionRef.set({ goal: g, isActive: false, groups });
  celebShown = false;
  document.getElementById('celebration').classList.remove('show');
  alert('초기화 완료! 새 수업을 시작할 수 있어요 🌱');
}

function startSession() {
  const g = parseInt(document.getElementById('goalInput').value) || 60;
  sessionRef.once('value', (snap) => {
    const data = snap.val();
    if (!data || !data.groups) {
      const groups = {};
      for (let i = 1; i <= 6; i++) groups[`group${i}`] = { count: 0, lastTap: 0 };
      sessionRef.set({ goal: g, isActive: true, groups });
    } else {
      sessionRef.update({ isActive: true, goal: g });
    }
    alert('수업을 시작했어요! 🌿\nstudent.html?group=번호 로 접속하면 됩니다.');
  });
}

// ══════════════════════════════════════
// 6) 축하 효과 — 화면 전체 꽃 쏟아짐
// ══════════════════════════════════════
function showCelebration() {
  document.getElementById('celebration').classList.add('show');

  // 1차 폭발 (즉시, 120개)
  for (let i = 0; i < 120; i++) {
    setTimeout(spawnFlower, i * 30);
  }
  // 2차 폭발 (4초 후, 80개 추가)
  setTimeout(() => {
    for (let i = 0; i < 80; i++) setTimeout(spawnFlower, i * 40);
  }, 4000);
  // 3차 폭발 (8초 후, 60개 추가)
  setTimeout(() => {
    for (let i = 0; i < 60; i++) setTimeout(spawnFlower, i * 50);
  }, 8000);
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
  // 남은 파티클 정리
  document.querySelectorAll('.flower-particle').forEach(el => el.remove());
}

function spawnFlower() {
  const flowers = ['🌼','🌸','🌺','🌻','🌷','💛','✨','🎉','💐'];
  const f       = document.createElement('div');
  f.className   = 'flower-particle';

  const size   = 20 + Math.random() * 40;   // 20~60px
  const left   = Math.random() * 100;        // 0~100vw
  const dur    = 3 + Math.random() * 4;      // 3~7초
  const delay  = Math.random() * 1.5;        // 0~1.5초 딜레이
  const scale  = 0.6 + Math.random() * 1.2;  // 0.6~1.8
  const swayX  = (Math.random() - 0.5) * 200; // -100~100px 좌우 흔들림
  const rot    = (Math.random() - 0.5) * 720; // 회전각

  f.textContent = flowers[Math.floor(Math.random() * flowers.length)];
  f.style.setProperty('--fsize', size + 'px');
  f.style.setProperty('--left',  left + 'vw');
  f.style.setProperty('--dur',   dur + 's');
  f.style.setProperty('--delay', delay + 's');
  f.style.setProperty('--s',     scale);
  f.style.setProperty('--sx',    swayX + 'px');
  f.style.setProperty('--rot',   rot + 'deg');

  document.body.appendChild(f);
  setTimeout(() => f.remove(), (dur + delay + 0.5) * 1000);
}
</script>
</body>
</html>
