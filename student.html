<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💧 개나리 물주기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Round+Square:wght@400;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

body {
  font-family: 'Nanum Round Square', 'Malgun Gothic', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  background: linear-gradient(175deg, #B0E4FF 0%, #D6F0FF 52%, #88CC66 52%, #5DAA50 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
}

/* ─────────── 헤더 ─────────── */
.header {
  width: 100%;
  background: linear-gradient(135deg, #FFD740 0%, #FFB300 100%);
  padding: 14px 24px;
  text-align: center;
  box-shadow: 0 3px 12px rgba(0,0,0,0.15);
  border-bottom: 3px solid #FF8F00;
  flex-shrink: 0;
}

.group-title {
  font-size: 2rem;
  font-weight: 800;
  color: #4E342E;
  letter-spacing: -0.5px;
}

.header-sub {
  font-size: 0.95rem;
  color: #6D4C41;
  margin-top: 2px;
}

/* ─────────── 메인 탭 영역 ─────────── */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 20px 16px;
  width: 100%;
}

.tap-label {
  font-size: 1.3rem;
  font-weight: 800;
  color: #1565C0;
  text-align: center;
  text-shadow: 1px 1px 4px rgba(255,255,255,0.8);
  min-height: 1.6rem;
  transition: color 0.3s;
}

/* ─────────── 물방울 버튼 ─────────── */
.drop-wrap {
  position: relative;
  width: min(220px, 55vw);
  height: min(260px, 65vw);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}

.drop-wrap svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 8px 20px rgba(30,144,255,0.5));
  transition: filter 0.4s;
}

.drop-wrap.cooldown svg {
  filter: drop-shadow(0 4px 8px rgba(150,150,150,0.4));
}

/* 탭 시 튀어오르는 효과 */
@keyframes dropBounce {
  0%   { transform: scale(1); }
  30%  { transform: scale(0.86); }
  65%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* 쿨타임 중 살살 흔들기 */
@keyframes coolShake {
  0%,100% { transform: rotate(0deg); }
  20%     { transform: rotate(-6deg); }
  40%     { transform: rotate(6deg); }
  60%     { transform: rotate(-4deg); }
  80%     { transform: rotate(4deg); }
}

/* 기본 두둥실 애니메이션 */
@keyframes idle {
  0%,100% { transform: translateY(0) scale(1); }
  50%     { transform: translateY(-8px) scale(1.02); }
}

.drop-wrap.idle-float { animation: idle 2.5s ease-in-out infinite; }
.drop-wrap.bounce     { animation: dropBounce 0.45s ease; }
.drop-wrap.shake      { animation: coolShake 0.35s ease; }

/* 리플 효과 */
.ripple {
  position: absolute;
  top: 50%; left: 50%;
  width: 180px; height: 180px;
  margin: -90px 0 0 -90px;
  border-radius: 50%;
  border: 4px solid rgba(30,144,255,0.6);
  pointer-events: none;
  animation: rippleOut 0.65s ease-out forwards;
}

@keyframes rippleOut {
  from { transform: scale(0.3); opacity: 1; }
  to   { transform: scale(1.8); opacity: 0; }
}

/* 물방울 주변 스파클 */
.sparkle {
  position: absolute;
  width: 10px; height: 10px;
  background: #FFE033;
  border-radius: 50%;
  pointer-events: none;
  animation: sparkleFloat 0.7s ease-out forwards;
}

@keyframes sparkleFloat {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
}

/* ─────────── 쿨타임 메시지 ─────────── */
.cooldown-msg {
  font-size: 1.1rem;
  font-weight: 700;
  color: #888;
  text-align: center;
  min-height: 1.5rem;
  text-shadow: 1px 1px 3px rgba(255,255,255,0.6);
}

/* ─────────── 카운트 표시 ─────────── */
.count-card {
  background: rgba(255,255,255,0.93);
  border-radius: 28px;
  padding: 16px 40px;
  text-align: center;
  box-shadow: 0 6px 24px rgba(0,0,0,0.12);
  border: 3px solid #FFE033;
}

.count-num {
  font-size: 3.8rem;
  font-weight: 800;
  color: #FF8F00;
  line-height: 1;
  transition: color 0.2s;
}

.count-label {
  font-size: 1rem;
  font-weight: 700;
  color: #6D4C41;
  margin-top: 4px;
}

@keyframes countPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.35); color: #FF5722; }
  100% { transform: scale(1); }
}

.count-num.pop { animation: countPop 0.4s ease; }

/* ─────────── 바닥 풀 장식 ─────────── */
.grass-line {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  background: #5DAA50;
  z-index: 0;
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="group-title" id="groupTitle">💧 모둠</div>
  <div class="header-sub">미션 완료할 때마다 물방울을 터치해요!</div>
</div>

<!-- 메인 탭 영역 -->
<div class="main-area">

  <!-- 탭 안내 문구 -->
  <div class="tap-label" id="tapLabel">💧 물방울을 눌러서 물을 주세요!</div>

  <!-- 물방울 버튼 -->
  <div class="drop-wrap idle-float" id="dropWrap" onclick="handleTap()">
    <svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- 활성 상태 그라디언트 -->
        <linearGradient id="grad-active" x1="25%" y1="0%" x2="75%" y2="100%">
          <stop offset="0%"   stop-color="#90CAF9"/>
          <stop offset="45%"  stop-color="#1E88E5"/>
          <stop offset="100%" stop-color="#0D47A1"/>
        </linearGradient>
        <!-- 쿨타임 상태 그라디언트 -->
        <linearGradient id="grad-cool" x1="25%" y1="0%" x2="75%" y2="100%">
          <stop offset="0%"   stop-color="#E3F2FD"/>
          <stop offset="45%"  stop-color="#90A4AE"/>
          <stop offset="100%" stop-color="#546E7A"/>
        </linearGradient>
        <!-- 광택 -->
        <radialGradient id="shine" cx="35%" cy="28%" r="38%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.85)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>

      <!-- 물방울 몸체 -->
      <path id="dropBody"
        d="M 100 18 C 100 18 28 98 28 150 C 28 190 60 218 100 218 C 140 218 172 190 172 150 C 172 98 100 18 100 18 Z"
        fill="url(#grad-active)"/>

      <!-- 광택 레이어 -->
      <path d="M 100 18 C 100 18 28 98 28 150 C 28 190 60 218 100 218 C 140 218 172 190 172 150 C 172 98 100 18 100 18 Z"
        fill="url(#shine)"/>

      <!-- 내부 하이라이트 -->
      <ellipse cx="72" cy="108" rx="14" ry="28" fill="rgba(255,255,255,0.28)"
        transform="rotate(-22, 72, 108)"/>

      <!-- 눈 흰자 -->
      <circle cx="80"  cy="150" r="11" fill="white"/>
      <circle cx="120" cy="150" r="11" fill="white"/>
      <!-- 눈동자 -->
      <circle id="eyeL" cx="82"  cy="151" r="6.5" fill="#0D47A1"/>
      <circle id="eyeR" cx="122" cy="151" r="6.5" fill="#0D47A1"/>
      <!-- 눈 하이라이트 -->
      <circle cx="84"  cy="148" r="2.5" fill="white"/>
      <circle cx="124" cy="148" r="2.5" fill="white"/>
      <!-- 입 (웃음) -->
      <path id="mouth"
        d="M 76 171 Q 100 188 124 171"
        stroke="#0D47A1" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- 볼 홍조 -->
      <ellipse cx="67"  cy="164" rx="10" ry="7" fill="rgba(255,100,100,0.22)"/>
      <ellipse cx="133" cy="164" rx="10" ry="7" fill="rgba(255,100,100,0.22)"/>
    </svg>
  </div>

  <!-- 쿨타임 메시지 -->
  <div class="cooldown-msg" id="cooldownMsg"></div>

  <!-- 카운트 표시 -->
  <div class="count-card">
    <div class="count-num" id="myCount">0</div>
    <div class="count-label" id="countLabel">번 물을 줬어요! 💧</div>
  </div>

</div>

<!-- 바닥 풀 -->
<div class="grass-line"></div>

<!-- ===================== Firebase SDK ===================== -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
// ────────────────────────────────────────────────
// 1) 모둠 번호 가져오기 (URL: ?group=1 ~ 6)
// ────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const groupNum = Math.min(Math.max(parseInt(params.get('group')) || 1, 1), 6);

document.getElementById('groupTitle').textContent = `💧 ${groupNum}모둠`;
document.title = `💧 ${groupNum}모둠 - 개나리 물주기`;

// ────────────────────────────────────────────────
// 2) Firebase 초기화
// ────────────────────────────────────────────────
firebase.initializeApp(firebaseConfig);
const db       = firebase.database();
const groupRef = db.ref(`session/groups/group${groupNum}`);

// ────────────────────────────────────────────────
// 3) 상태 변수
// ────────────────────────────────────────────────
const COOLDOWN_MS = 3000;
let isCooldown   = false;
let prevCount    = 0;

// ────────────────────────────────────────────────
// 4) Firebase 실시간 리스너 — 내 모둠 카운트
// ────────────────────────────────────────────────
groupRef.on('value', (snap) => {
  const data  = snap.val() || {};
  const count = data.count || 0;
  updateCountDisplay(count);
});

// ────────────────────────────────────────────────
// 5) 탭 핸들러
// ────────────────────────────────────────────────
function handleTap() {
  const wrap = document.getElementById('dropWrap');

  if (isCooldown) {
    // 쿨타임 중: 흔들기만
    triggerAnim(wrap, 'shake');
    return;
  }

  // 탭 성공!
  isCooldown = true;
  triggerAnim(wrap, 'bounce');
  addRipple(wrap);
  addSparkles(wrap);

  // Firebase에 카운트 +1
  groupRef.transaction((cur) => {
    if (cur === null) return { count: 1, lastTap: Date.now() };
    return { count: (cur.count || 0) + 1, lastTap: Date.now() };
  });

  // 쿨타임 카운트다운
  startCooldown();
}

function startCooldown() {
  const wrap  = document.getElementById('dropWrap');
  const msg   = document.getElementById('cooldownMsg');
  const label = document.getElementById('tapLabel');
  const body  = document.getElementById('dropBody');

  wrap.classList.remove('idle-float');
  wrap.classList.add('cooldown');
  body.setAttribute('fill', 'url(#grad-cool)');

  // 표정 변경 (ㅡㅡ 눈)
  document.getElementById('eyeL').setAttribute('r', '6.5');
  document.getElementById('eyeR').setAttribute('r', '6.5');
  document.getElementById('mouth').setAttribute('d', 'M 80 175 Q 100 172 120 175');

  let remaining = Math.ceil(COOLDOWN_MS / 1000);
  label.textContent = '잠깐! 물 흡수 중... 🌱';
  msg.textContent   = `${remaining}초 후에 다시 줄 수 있어요`;

  const tick = setInterval(() => {
    remaining--;
    if (remaining > 0) {
      msg.textContent = `${remaining}초 후에 다시 줄 수 있어요`;
    } else {
      clearInterval(tick);
      endCooldown();
    }
  }, 1000);

  setTimeout(endCooldown, COOLDOWN_MS);
}

function endCooldown() {
  if (!isCooldown) return;
  isCooldown = false;

  const wrap  = document.getElementById('dropWrap');
  const msg   = document.getElementById('cooldownMsg');
  const label = document.getElementById('tapLabel');
  const body  = document.getElementById('dropBody');

  wrap.classList.remove('cooldown');
  wrap.classList.add('idle-float');
  body.setAttribute('fill', 'url(#grad-active)');

  // 표정 복원
  document.getElementById('mouth').setAttribute('d', 'M 76 171 Q 100 188 124 171');

  label.textContent = '💧 물방울을 눌러서 물을 주세요!';
  msg.textContent   = '';
}

// ────────────────────────────────────────────────
// 6) 카운트 표시 업데이트
// ────────────────────────────────────────────────
function updateCountDisplay(count) {
  const el = document.getElementById('myCount');
  el.textContent = count;

  if (count > prevCount) {
    triggerAnim(el, 'pop');
    // 100번 이상이면 특별 메시지
    if (count >= 100) {
      document.getElementById('countLabel').textContent = '번!! 대단해요!! 🏆💧';
    } else if (count >= 50) {
      document.getElementById('countLabel').textContent = '번!! 정말 열심히 했어요! 🌟';
    }
  }
  prevCount = count;
}

// ────────────────────────────────────────────────
// 7) 유틸리티 — 애니메이션 토글
// ────────────────────────────────────────────────
function triggerAnim(el, cls) {
  el.classList.remove(cls);
  void el.offsetWidth;   // reflow 강제
  el.classList.add(cls);
  el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
}

// 리플 효과
function addRipple(parent) {
  const r = document.createElement('div');
  r.className = 'ripple';
  parent.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

// 스파클 효과 (탭 주변에 노란 점 튀기)
function addSparkles(parent) {
  for (let i = 0; i < 8; i++) {
    const s   = document.createElement('div');
    s.className = 'sparkle';
    const angle = (i / 8) * 360;
    const dist  = 60 + Math.random() * 40;
    const sx    = Math.cos((angle * Math.PI) / 180) * dist + 'px';
    const sy    = Math.sin((angle * Math.PI) / 180) * dist + 'px';
    s.style.setProperty('--sx', sx);
    s.style.setProperty('--sy', sy);
    s.style.left = '50%';
    s.style.top  = '50%';
    s.style.marginLeft = '-5px';
    s.style.marginTop  = '-5px';
    s.style.background = ['#FFE033','#FFB300','#87CEEB','#FF8A65'][i % 4];
    parent.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }
}
</script>
</body>
</html>
